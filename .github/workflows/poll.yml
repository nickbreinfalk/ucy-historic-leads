name: poll-historic-leads

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub cron can run a few min late)
  workflow_dispatch: {}      # allow manual "Run workflow" from the Actions tab

concurrency:
  group: poll-historic-leads
  cancel-in-progress: false  # let an in-flight run finish; never overlap

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (node24)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (node24)
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python poll.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
