name: weekly-leads-reminder

on:
  schedule:
    # Friday 14:00 UTC = ~afternoon in Valencia (16:00 CEST summer / 15:00 CET winter).
    # GitHub cron can run a few minutes late — fine for a reminder.
    - cron: "0 14 * * 5"
  workflow_dispatch: {}    # lets you (or me) fire a test reminder on demand

concurrency:
  group: weekly-leads-reminder
  cancel-in-progress: false   # a manual dispatch near the cron won't double-post

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (node24)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (node24)
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install slack_sdk python-dotenv
      - run: python remind.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
